<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Ominfra AS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
      background: white;
    }

    .hero h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #666;
    }

    .services {
      padding: 40px 20px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-top: 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1f2937;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>Ominfra AS</h1>
  <p>Infrastruktur & entreprenør</p>
</header>

<section class="hero">
  <h2>Vi bygger fremtiden</h2>
  <p>Profesjonelle tjenester innen infrastruktur og grunnarbeid</p>
</section>

<section class="services">
  <div class="card">
    <h3>Grunnarbeid</h3>
    <p>Alt innen graving og klargjøring av tomt</p>
  </div>

  <div class="card">
    <h3>VA-anlegg</h3>
    <p>Vann og avløp installasjoner</p>
  </div>

  <div class="card">
    <h3>Transport</h3>
    <p>Effektiv massetransport og logistikk</p>
  </div>
</section>

<footer>
  <p>Kontakt: post@ominfra.no</p>
</footer>

</body>
</html>
